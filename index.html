<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นาฬิกาเพื่อลูก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #050505; color: #fff; }
        .font-digit { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- นาฬิกาปัจจุบัน -->
    <div class="mb-8 text-center">
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">เวลาปัจจุบัน</p>
        <div id="current-clock" class="font-digit text-4xl text-indigo-400">00:00:00</div>
    </div>

    <!-- ส่วนจับเวลา -->
    <div class="w-full max-w-sm bg-slate-900/50 p-6 rounded-3xl border border-slate-800 shadow-xl">
        <p class="text-gray-400 text-xs uppercase mb-2">เวลาที่ผ่านไป (ตั้งแต่เริ่ม)</p>
        <div id="tracker-display" class="font-digit text-5xl font-bold text-white mb-6 tracking-wider">00:00:00</div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <select id="interval-select" class="col-span-2 bg-slate-800 p-3 rounded-xl text-sm border border-slate-700">
                <option value="1">เตือนทุก 1 ชั่วโมง</option>
                <option value="2" selected>เตือนทุก 2 ชั่วโมง (ให้นม)</option>
                <option value="4">เตือนทุก 4 ชั่วโมง (สัญญาณชีพ)</option>
            </select>
            <button onclick="tracker.start()" class="py-3 bg-indigo-600 rounded-xl font-bold">เริ่ม/รีเซ็ต</button>
            <button onclick="tracker.stop()" class="py-3 bg-slate-700 rounded-xl font-bold">หยุด</button>
        </div>

        <!-- ส่วนอัดเสียง -->
        <div class="border-t border-slate-800 pt-4">
            <p class="text-[10px] text-gray-500 uppercase mb-2">เสียงแจ้งเตือน (อัดทับได้)</p>
            <button id="record-btn" onclick="audioManager.toggleRecord()" class="w-full py-2 bg-red-900/50 hover:bg-red-900/80 border border-red-800 rounded-xl text-sm font-bold transition">
                🔴 อัดเสียงแจ้งเตือน
            </button>
            <audio id="audio-player" class="hidden"></audio>
        </div>
    </div>

    <script>
        // อัปเดตเวลาจริง
        setInterval(() => {
            document.getElementById('current-clock').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false });
        }, 1000);

        // จัดการเสียง
        const audioManager = {
            recorder: null, chunks: [],
            async toggleRecord() {
                const btn = document.getElementById('record-btn');
                if (!this.recorder || this.recorder.state === 'inactive') {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.recorder = new MediaRecorder(stream);
                    this.chunks = [];
                    this.recorder.ondataavailable = e => this.chunks.push(e.data);
                    this.recorder.onstop = () => {
                        document.getElementById('audio-player').src = URL.createObjectURL(new Blob(this.chunks));
                        btn.innerText = 'อัดเสียงใหม่';
                    };
                    this.recorder.start();
                    btn.innerText = '⏹ หยุดอัด';
                } else { this.recorder.stop(); }
            },
            play() { document.getElementById('audio-player').play(); }
        };

        // จับเวลาสะสม
        const tracker = {
            startTime: null, interval: null,
            start() {
                this.startTime = Date.now();
                if (this.interval) clearInterval(this.interval);
                this.interval = setInterval(() => this.update(), 1000);
            },
            stop() { clearInterval(this.interval); this.interval = null; },
            update() {
                let elapsed = Date.now() - this.startTime;
                // วนรอบทุก 24 ชม.
                if (elapsed >= 86400000) this.start(); 
                
                // เช็คแจ้งเตือนตามรอบที่เลือก
                const intervalHours = parseInt(document.getElementById('interval-select').value);
                const intervalMs = intervalHours * 3600000;
                
                // ถ้าครบเวลาพอดี (บวกลบ 500ms) ให้เล่นเสียง
                if (elapsed > 0 && elapsed % intervalMs < 1000) {
                    audioManager.play();
                }

                this.render(elapsed);
            },
            render(ms) {
                let seconds = Math.floor(ms / 1000);
                let h = String(Math.floor(seconds / 3600)).padStart(2, '0');
                let m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
                let s = String(seconds % 60).padStart(2, '0');
                document.getElementById('tracker-display').innerText = `${h}:${m}:${s}`;
            }
        };
    </script>
</body>
</html>
