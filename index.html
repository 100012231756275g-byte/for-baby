<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Timer & Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #050505; color: #ffffff; }
        .clock-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="text-center mb-6">
        <h1 class="text-gray-500 text-xs tracking-widest uppercase">เวลาปัจจุบัน</h1>
        <div id="current-time" class="clock-font text-4xl font-bold text-indigo-400">00:00:00</div>
    </div>

    <div id="tracker-container" class="w-full max-w-sm space-y-4">
        <!-- รายการจะถูกสร้างโดยอัตโนมัติที่นี่ -->
    </div>

    <script>
        const trackers = [
            { id: 'feed', name: 'ให้นมลูก', interval: 2, lastTime: null, startTime: null, audio: null, status: 'idle' },
            { id: 'vitals', name: 'วัดสัญญาณชีพ', interval: 4, lastTime: null, startTime: null, audio: null, status: 'idle' }
        ];

        function updateClock() {
            document.getElementById('current-time').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false });
            
            trackers.forEach(t => {
                if (t.status === 'running') {
                    const elapsed = Math.floor((Date.now() - t.startTime) / 1000);
                    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    document.getElementById(`timer-${t.id}`).innerText = `${h}:${m}:${s}`;

                    if (elapsed >= (t.interval * 3600)) {
                        playAlarm(t);
                    }
                }
            });
        }

        function playAlarm(t) {
            alert(`ถึงเวลา ${t.name} แล้ว!`);
            if (t.audio) {
                const a = new Audio(t.audio);
                a.play().catch(e => console.log("รอการโต้ตอบจากผู้ใช้"));
            }
            // วนลูปการนับเวลาใหม่
            t.startTime = Date.now();
        }

        function startTimer(id) {
            const t = trackers.find(x => x.id === id);
            t.status = 'running';
            t.startTime = Date.now();
        }

        function stopTimer(id) {
            const t = trackers.find(x => x.id === id);
            t.status = 'idle';
            document.getElementById(`timer-${t.id}`).innerText = "00:00:00";
        }

        function testAudio(id) {
            const t = trackers.find(x => x.id === id);
            if (t && t.audio) {
                const a = new Audio(t.audio);
                a.play().catch(e => alert("เบราว์เซอร์บล็อกการเล่นเสียงอัตโนมัติ"));
            } else {
                alert("ยังไม่มีเสียงที่บันทึกไว้ครับ");
            }
        }

        const container = document.getElementById('tracker-container');
        trackers.forEach(t => {
            container.innerHTML += `
                <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-bold text-lg">${t.name}</h2>
                        <input type="number" value="${t.interval}" onchange="updateInterval('${t.id}', this.value)" 
                            class="w-16 bg-slate-800 text-center rounded-lg py-1 border border-slate-700">
                    </div>
                    <div id="timer-${t.id}" class="text-3xl font-mono text-emerald-400 mb-4 text-center">00:00:00</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="startTimer('${t.id}')" class="py-2 bg-emerald-600 rounded-xl text-xs font-bold">เริ่ม</button>
                        <button onclick="stopTimer('${t.id}')" class="py-2 bg-rose-600 rounded-xl text-xs font-bold">หยุด</button>
                        <button onclick="recordAudio('${t.id}')" id="btn-${t.id}" class="py-2 bg-slate-700 rounded-xl text-xs font-bold">อัดเสียง</button>
                        <button onclick="testAudio('${t.id}')" class="py-2 bg-indigo-600 rounded-xl text-xs font-bold">เทส</button>
                    </div>
                </div>
            `;
        });

        function updateInterval(id, val) {
            const t = trackers.find(x => x.id === id);
            t.interval = parseInt(val);
        }

        async function recordAudio(id) {
            const btn = document.getElementById(`btn-${id}`);
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const t = trackers.find(x => x.id === id);
                t.audio = URL.createObjectURL(new Blob(chunks));
                btn.innerText = 'อัดสำเร็จ';
                setTimeout(() => btn.innerText = 'อัดเสียง', 2000);
            };

            recorder.start();
            btn.innerText = 'กำลังอัด...';
            setTimeout(() => recorder.stop(), 5000);
        }

        setInterval(updateClock, 1000);
    </script>
</body>
</html>
