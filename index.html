 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>เพื่อลูก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            touch-action: pan-y;
            -webkit-tap-highlight-color: transparent;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3), inset 0 0 10px rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.5);
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
        }
        .alert-active { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-5 pb-10">

    <header class="flex justify-between items-start mb-6 pt-safe">
        <div>
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 tracking-tight">เพื่อลูก</h1>
            <p class="text-xs text-gray-500 mt-1">แอปแจ้งเตือนแม่เลี้ยงเดี่ยว</p>
        </div>
        <div id="system-status" class="flex flex-col items-end">
            <span id="wakelock-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-red-900/50 text-red-400 border border-red-700">
                ⚠️ จออาจดับได้
            </span>
            <span class="text-[9px] text-gray-500 mt-1 text-right">ถ้าใช้งาน ให้เปิดจอนี้ทิ้งไว้เสมอ</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
        
        <div class="relative flex items-center justify-center mb-10 w-full aspect-square max-w-[280px]">
            <svg class="w-full h-full transform -rotate-90 drop-shadow-2xl">
                <circle cx="50%" cy="50%" r="45%" stroke="#1e293b" stroke-width="8" fill="none" />
                <circle id="progress-ring" cx="50%" cy="50%" r="45%" stroke="#6366f1" stroke-width="8" fill="none" stroke-dasharray="283" stroke-dashoffset="0" pathLength="100" class="transition-all duration-500 linear" stroke-linecap="round" />
            </svg>
            
            <div class="absolute flex flex-col items-center text-center">
                <div id="phase-label" class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1">สถานะ: รอใช้งาน</div>
                <div id="main-time" class="text-5xl font-bold font-mono tracking-tighter tabular-nums drop-shadow-lg">04:00:00</div>
                <div id="next-action-label" class="text-[11px] text-gray-500 mt-2 bg-slate-900/80 px-3 py-1 rounded-full border border-slate-800">รอบถัดไป: -</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 w-full mb-8">
            <button onclick="system.start(14400)" class="col-span-2 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl font-bold text-lg neon-border active:scale-95 transition-transform shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                ▶ เริ่มนับเวลา (รันยาว 4 ชม.)
            </button>
            <button onclick="system.start(10)" class="py-3 bg-slate-800/80 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-semibold transition text-gray-300">
                เทส 10 วินาที
            </button>
            <button onclick="system.stop()" class="py-3 bg-red-950/40 text-red-400 border border-red-900/50 hover:bg-red-900/60 rounded-xl text-sm font-semibold transition">
                ⏹ หยุด
            </button>
        </div>

    </main>

    <footer class="w-full max-w-md mx-auto bg-slate-900/60 rounded-2xl p-4 border border-slate-800 backdrop-blur-md">
        <h3 class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-3">การตั้งค่าเสียงเตือน</h3>
        
        <div class="space-y-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 text-xl border border-blue-500/20">🍼</div>
                    <div>
                        <div class="text-sm font-medium">เตือนให้นม <span class="text-[10px] text-gray-500">(ทุก 2 ชม.)</span></div>
                        <div id="status-feed" class="text-[10px] text-gray-400">ใช้เสียงตี๊ดอัตโนมัติ</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-rec-feed" onclick="audioManager.toggleRecord('feed')" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-lg active:bg-slate-700 transition shadow-inner">🔴</button>
                    <button id="btn-del-feed" onclick="audioManager.deleteAudio('feed')" class="hidden w-10 h-10 bg-red-900/30 text-red-400 border border-red-900/50 rounded-full flex items-center justify-center text-sm">ลบ</button>
                </div>
                <audio id="audio-feed" class="hidden"></audio>
            </div>

            <div class="w-full h-px bg-slate-800/50"></div>

            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-400 text-xl border border-rose-500/20">❤️</div>
                    <div>
                        <div class="text-sm font-medium">เตือนสัญญาณชีพ <span class="text-[10px] text-gray-500">(ทุก 4 ชม.)</span></div>
                        <div id="status-vitals" class="text-[10px] text-gray-400">ใช้เสียงตี๊ดอัตโนมัติ</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-rec-vitals" onclick="audioManager.toggleRecord('vitals')" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-lg active:bg-slate-700 transition shadow-inner">🔴</button>
                    <button id="btn-del-vitals" onclick="audioManager.deleteAudio('vitals')" class="hidden w-10 h-10 bg-red-900/30 text-red-400 border border-red-900/50 rounded-full flex items-center justify-center text-sm">ลบ</button>
                </div>
                <audio id="audio-vitals" class="hidden"></audio>
            </div>
        </div>
    </footer>

    <div id="alarm-overlay" class="fixed inset-0 bg-black/90 z-50 hidden flex-col items-center justify-center p-6 backdrop-blur-lg transition-opacity">
        <div id="alarm-box" class="w-full max-w-sm bg-slate-900 rounded-[2rem] p-8 text-center border-2 border-red-500 shadow-[0_0_80px_rgba(239,68,68,0.4)]">
            <div id="alarm-icon" class="text-8xl mb-6 animate-bounce drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">🚨</div>
            <h2 id="alarm-title" class="text-3xl font-bold text-white mb-2">แจ้งเตือน!</h2>
            <p id="alarm-desc" class="text-gray-400 mb-8 text-sm">ระบบกำลังเริ่มนับรอบต่อไปอัตโนมัติ</p>
            <button onclick="system.dismissAlarm()" class="w-full py-5 bg-gradient-to-r from-red-600 to-rose-600 active:scale-95 text-white rounded-2xl font-bold text-xl uppercase tracking-wider transition-all shadow-xl">
                รับทราบ (หยุดเสียง)
            </button>
        </div>
    </div>

    <script>
        (function injectPWA() {
            // สร้าง Manifest (ไอคอนและชื่อแอปบนจอโฮม)
            const manifestObj = {
                "name": "เพื่อลูก - Baby Monitor",
                "short_name": "เพื่อลูก",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#000000",
                "theme_color": "#000000",
                "icons": [{
                    "src": "https://cdn-icons-png.flaticon.com/512/883/883356.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/manifest+json'});
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);

            // สร้าง Service Worker เพื่อให้แอปติดตั้งได้
            const swCode = `self.addEventListener('fetch', function(e) {}); self.addEventListener('install', function(e) { self.skipWaiting(); });`;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Setup Error:', err));
            }
        })();

        const audioManager = {
            recorders: {}, chunks: {},
            async toggleRecord(type) {
                const btn = document.getElementById(`btn-rec-${type}`);
                const status = document.getElementById(`status-${type}`);
                if (!this.recorders[type] || this.recorders[type].state === 'inactive') {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.recorders[type] = new MediaRecorder(stream);
                        this.chunks[type] = [];
                        this.recorders[type].ondataavailable = e => this.chunks[type].push(e.data);
                        this.recorders[type].onstop = () => {
                            const blob = new Blob(this.chunks[type], { type: 'audio/webm' });
                            const el = document.getElementById(`audio-${type}`);
                            if(el.src) URL.revokeObjectURL(el.src);
                            el.src = URL.createObjectURL(blob);
                            
                            status.innerText = 'บันทึกเสียงของคุณเรียบร้อย';
                            status.className = 'text-[10px] text-green-400 font-semibold';
                            document.getElementById(`btn-del-${type}`).classList.remove('hidden');
                            btn.innerHTML = '🔄'; btn.classList.remove('bg-red-600', 'animate-pulse'); btn.classList.add('bg-slate-800');
                        };
                        this.recorders[type].start();
                        btn.innerHTML = '⏹'; btn.classList.remove('bg-slate-800'); btn.classList.add('bg-red-600', 'animate-pulse');
                        status.innerText = 'กำลังบันทึก... พูดเลย!'; status.className = 'text-[10px] text-red-400 animate-pulse font-semibold';
                    } catch (e) { showCustomAlert('กรุณาอนุญาตให้แอปใช้ไมโครโฟนก่อนครับ'); }
                } else { this.recorders[type].stop(); }
            },
            deleteAudio(type) {
                const el = document.getElementById(`audio-${type}`);
                if(el.src) { URL.revokeObjectURL(el.src); el.removeAttribute('src'); el.load(); }
                document.getElementById(`btn-del-${type}`).classList.add('hidden');
                document.getElementById(`btn-rec-${type}`).innerHTML = '🔴';
                const status = document.getElementById(`status-${type}`);
                status.innerText = 'ใช้เสียงตี๊ดอัตโนมัติ'; status.className = 'text-[10px] text-gray-400';
            },
            playFallback() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'square'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.setValueAtTime(1108.73, ctx.currentTime + 0.2); 
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } catch(e) {}
            }
        };

        const displayManager = {
            wakeLock: null,
            async lock() {
                try {
                    if ('wakeLock' in navigator) {
                        this.wakeLock = await navigator.wakeLock.request('screen');
                        const badge = document.getElementById('wakelock-badge');
                        badge.innerText = '🛡️ เปิดจอตลอดเวลา: ทำงาน';
                        badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-green-900/50 text-green-400 border border-green-700 shadow-[0_0_10px_rgba(74,222,128,0.2)]';
                    }
                } catch (e) { console.warn('WakeLock failed'); }
            },
            unlock() {
                if (this.wakeLock) {
                    this.wakeLock.release().then(() => this.wakeLock = null);
                    const badge = document.getElementById('wakelock-badge');
                    badge.innerText = '⚠️ จออาจดับได้';
                    badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-red-900/50 text-red-400 border border-red-700';
                }
            }
        };

        function showCustomAlert(msg) {
            // สร้าง Alert จำลองแทนการใช้ alert() ดั้งเดิม
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6 backdrop-blur-sm';
            modal.innerHTML = `
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 max-w-sm w-full text-center shadow-2xl">
                    <p class="text-white mb-6">${msg}</p>
                    <button onclick="this.parentElement.parentElement.remove()" class="bg-indigo-600 w-full py-3 rounded-xl font-bold text-white">ตกลง</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        const workerScript = `
            let endTime = 0; let cycle = 0; let feedTriggered = false; let active = false;
            self.onmessage = e => {
                if (e.data.cmd === 'start') {
                    cycle = e.data.dur; endTime = Date.now() + cycle * 1000;
                    feedTriggered = false; active = true;
                } else if (e.data.cmd === 'stop') { active = false; }
            };
            setInterval(() => {
                if (!active) return;
                const remain = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                const half = Math.floor(cycle / 2);
                self.postMessage({ t: 'tick', r: remain, total: cycle });
                
                if (remain <= half && !feedTriggered) {
                    feedTriggered = true; self.postMessage({ t: 'alert', kind: 'feed' });
                }
                if (remain <= 0) {
                    self.postMessage({ t: 'alert', kind: 'vitals' });
                    endTime = Date.now() + cycle * 1000; feedTriggered = false; // Auto Loop
                }
            }, 500);
        `;

        const system = {
            worker: new Worker(URL.createObjectURL(new Blob([workerScript], {type: 'application/javascript'}))),
            currentAudio: null, intervalAudio: null,
            init() {
                this.worker.onmessage = (e) => {
                    if (e.data.t === 'tick') this.updateUI(e.data.r, e.data.total);
                    else if (e.data.t === 'alert') this.triggerAlarm(e.data.kind);
                };
                this.updateUI(14400, 14400); 
            },
            start(sec) {
                new (window.AudioContext || window.webkitAudioContext)().resume();
                document.querySelectorAll('audio').forEach(a => {
                    if(a.src && !a.src.includes(window.location.host)) a.play().then(()=>a.pause()).catch(e=>{});
                });
                displayManager.lock();
                this.worker.postMessage({ cmd: 'start', dur: sec });
                document.getElementById('phase-label').innerText = 'แอปกำลังทำงาน';
                document.getElementById('phase-label').className = 'text-sm font-bold text-indigo-400 uppercase tracking-widest mb-1 animate-pulse';
            },
            stop() {
                this.worker.postMessage({ cmd: 'stop' });
                displayManager.unlock();
                this.updateUI(14400, 14400);
                document.getElementById('phase-label').innerText = 'สถานะ: รอใช้งาน';
                document.getElementById('phase-label').className = 'text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1';
            },
            updateUI(r, total) {
                const h = String(Math.floor(r / 3600)).padStart(2, '0');
                const m = String(Math.floor((r % 3600) / 60)).padStart(2, '0');
                const s = String(r % 60).padStart(2, '0');
                document.getElementById('main-time').innerText = `${h}:${m}:${s}`;
                
                const dashoffset = 100 - ((r / total) * 100);
                const ring = document.getElementById('progress-ring');
                ring.style.strokeDashoffset = dashoffset;
                
                const nextAction = document.getElementById('next-action-label');
                if (r > total / 2) {
                    ring.style.stroke = '#818cf8'; 
                    nextAction.innerHTML = '<span class="text-blue-400">🍼 ให้นม</span> (เป้าหมายถัดไป)';
                } else {
                    ring.style.stroke = '#fb7185'; 
                    nextAction.innerHTML = '<span class="text-rose-400">❤️ สัญญาณชีพ</span> (เป้าหมายถัดไป)';
                }
            },
            triggerAlarm(kind) {
                const overlay = document.getElementById('alarm-overlay');
                const title = document.getElementById('alarm-title');
                const icon = document.getElementById('alarm-icon');
                const box = document.getElementById('alarm-box');
                const audioEl = document.getElementById(`audio-${kind}`);

                overlay.classList.remove('hidden'); overlay.classList.add('flex');
                box.classList.add('alert-active');

                if (kind === 'feed') {
                    title.innerText = 'ถึงเวลาให้นมลูก!'; title.className = 'text-4xl font-bold text-blue-400 mb-2 drop-shadow-md'; icon.innerText = '🍼';
                } else {
                    title.innerText = 'วัดสัญญาณชีพ!'; title.className = 'text-4xl font-bold text-rose-500 mb-2 drop-shadow-md'; icon.innerText = '❤️';
                }

                if (audioEl.src && !audioEl.src.includes(window.location.host)) {
                    this.currentAudio = audioEl; this.currentAudio.loop = true;
                    this.currentAudio.play().catch(() => {
                        audioManager.playFallback(); this.intervalAudio = setInterval(audioManager.playFallback, 1500);
                    });
                } else {
                    audioManager.playFallback(); this.intervalAudio = setInterval(audioManager.playFallback, 1500);
                }
            },
            dismissAlarm() {
                document.getElementById('alarm-overlay').classList.add('hidden'); document.getElementById('alarm-overlay').classList.remove('flex');
                document.getElementById('alarm-box').classList.remove('alert-active');
                if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio.currentTime = 0; this.currentAudio.loop = false; this.currentAudio = null; }
                if (this.intervalAudio) { clearInterval(this.intervalAudio); this.intervalAudio = null; }
            }
        };

        system.init();
    </script>
</body>
</html>
